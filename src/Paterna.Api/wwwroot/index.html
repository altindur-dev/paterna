<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paterna Store</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <nav class="nav">
      <div class="brand">
        <h1>Paterna</h1>
        <small>Global Products</small>
      </div>
      <div class="nav-actions">
        <label for="currency">Currency</label>
        <select id="currency">
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
          <option value="GBP">GBP</option>
        </select>
        <button id="cartBtn">Cart (<span id="cartCount">0</span>)</button>
      </div>
    </nav>
    <div class="hero-content">
      <h2>Paterna Store</h2>
      <p>Architecture-inspired products for modern makers — shipping worldwide.</p>
    </div>
  </header>

  <main>
    <section class="card auth">
      <h2>Login / Signup</h2>
      <div class="tabs">
        <button id="showLogin" class="active">Login</button>
        <button id="showSignup">Signup</button>
      </div>

      <form id="loginForm">
        <input name="email" type="email" placeholder="Email" required />
        <input name="password" type="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>

      <form id="signupForm" class="hidden">
        <input name="name" type="text" placeholder="Full name" required />
        <input name="email" type="email" placeholder="Email" required />
        <input name="password" type="password" placeholder="Password" required />
        <button type="submit">Signup</button>
      </form>

      <p id="authStatus"></p>
    </section>

    <section class="card products-card">
      <h2>Featured Products</h2>
      <div id="products" class="products"></div>
    </section>

    <aside id="cart" class="cart hidden">
      <h3>Your Cart</h3>
      <div id="cartItems" class="cart-items"></div>
      <div class="cart-footer">
        <div class="total">Total: <span id="cartTotal">$0.00</span></div>
        <button id="checkout">Checkout</button>
      </div>
      <button id="closeCart" class="close-cart">Close</button>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
