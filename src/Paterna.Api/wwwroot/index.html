<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paterna Store</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <nav class="nav">
      <div class="brand">
        <h1>Paterna</h1>
        <small>Global Products · Ship Worldwide</small>
      </div>
      <div class="nav-actions">
        <input id="search" placeholder="Search products, e.g. lamp" />
        <label for="currency">Currency</label>
        <select id="currency">
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
          <option value="GBP">GBP</option>
        </select>
        <button id="cartBtn">Cart (<span id="cartCount">0</span>)</button>
      </div>
    </nav>
    <div class="hero-content">
      <h2>Design-forward products for global makers</h2>
      <p class="lead">Curated selection inspired by modern software architecture and classic design patterns.</p>
      <div class="hero-cta">
        <button id="shopNow">Shop Now</button>
        <button id="learnMore" class="ghost">Learn Arkitektura</button>
      </div>
    </div>
  </header>

  <main>
    <section class="card auth">
      <h2>Login / Signup</h2>
      <div class="tabs">
        <button id="showLogin" class="active">Login</button>
        <button id="showSignup">Signup</button>
      </div>

      <form id="loginForm">
        <input name="email" type="email" placeholder="Email" required />
        <input name="password" type="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>

      <form id="signupForm" class="hidden">
        <input name="name" type="text" placeholder="Full name" required />
        <input name="email" type="email" placeholder="Email" required />
        <input name="password" type="password" placeholder="Password" required />
        <button type="submit">Signup</button>
      </form>

      <p id="authStatus"></p>
    </section>

    <section class="card products-card">
      <div class="controls">
        <div class="tabs">
          <button class="tab active" data-tab="all">All</button>
          <button class="tab" data-tab="architectures">Architectures</button>
          <button class="tab" data-tab="patterns">Patterns</button>
          <button class="tab" data-tab="featured">Featured</button>
        </div>

        <div class="filters">
          <label>Arkitektura</label>
          <select id="filterArchitecture">
            <option value="">Any</option>
          </select>

          <label>Paternat</label>
          <select id="filterPattern">
            <option value="">Any</option>
          </select>
        </div>
      </div>

      <h2 id="productsTitle">Products</h2>
      <div id="products" class="products"></div>
    </section>

    <aside id="cart" class="cart hidden">
      <h3>Your Cart</h3>
      <div id="cartItems" class="cart-items"></div>
      <div class="cart-footer">
        <div class="total">Total: <span id="cartTotal">$0.00</span></div>
        <button id="checkout">Checkout</button>
      </div>
      <button id="closeCart" class="close-cart">Close</button>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
